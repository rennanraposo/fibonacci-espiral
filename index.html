<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espiral de Fibonacci</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cabeçalho da página -->
    <header class="cabecalho">
        <h1>Espiral de Fibonacci</h1>
        <p>
            Aplicação web interativa que gera a sequência de Fibonacci
            e apresenta sua representação visual de forma simples.
        </p>
    </header>

    <!-- Conteúdo principal -->
    <main class="conteudo-principal">
        <!-- Seção de controles e exibição da sequência -->
        <section class="painel controles">
            <h2>Controles</h2>

            <div class="grupo-botoes">
                <button id="btnAdicionar">Adicionar próximo número</button>
                <button id="btnReiniciar">Reiniciar sequência</button>
            </div>

            <div id="listaFibonacci" class="lista-fibonacci"></div>
        </section>

        <!-- Seção do desenho -->
        <section class="painel desenho">
            <h2>Representação visual</h2>
            <canvas id="canvasEspiral" width="400" height="400"></canvas>
        </section>
    </main>

    <!-- Rodapé -->
    <footer class="rodape">
        <p>RA: 2026107596 - NOME: RENNAN RAPOSO</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
